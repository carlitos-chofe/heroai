version: '3.8'

services:
#Broker de mensajes para Celery
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

#API Principal (FastAPI)

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

#Worker de Celery (IA Scripting & Images)

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
